# Render Blueprint — Commission Decision App (SCDMS)
# Docs: docs/deployment-render.md
#
# Deploy: connect GitHub repo → New Blueprint → select this file.
# After first deploy, set sync:false env vars in the Render dashboard.

databases:
  - name: scdms-db
    databaseName: commission_decision
    user: scdms
    plan: basic-256mb

services:
  - type: keyvalue
    name: scdms-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: scdms-api
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    healthCheckPath: /health/
    disk:
      name: scdms-media
      mountPath: /var/scdms/media
      sizeGB: 10
    envVars:
      - key: RENDER
        value: "true"
      - key: DJANGO_DEBUG
        value: "false"
      - key: AUTO_SEED
        value: "0"
      - key: SERVE_MEDIA
        value: "true"
      - key: USE_WHITENOISE
        value: "true"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: scdms-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString
      - key: DJANGO_ALLOWED_HOSTS
        # The API's own Render hostname. Override if you add a custom domain.
        value: "scdms-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        # Falls back to FRONTEND_URL if unset. Set explicitly only when you need
        # additional origins (e.g. custom domain: https://scdms.psc.gov.vu).
        sync: false
      - key: FRONTEND_URL
        # Public URL of the scdms-web static site — used for CORS and email links.
        # Override in the Render dashboard if you use a custom domain.
        value: "https://scdms-web.onrender.com"
      - key: CDP_BASE_URL
        # Public URL of this API service — used for media callbacks and CORS.
        # Override in the Render dashboard if you use a custom domain.
        value: "https://scdms-api.onrender.com"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INTERNAL_MEDIA_TOKEN
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_TLS
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  - type: worker
    name: scdms-celery-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    # solo pool: fits Render Starter RAM; prefork often OOMs with Django + AI libs
    dockerCommand: celery -A config worker -l info --pool=solo --concurrency=1
    envVars:
      - key: RENDER
        value: "true"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: scdms-api
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: scdms-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        fromService:
          type: web
          name: scdms-api
          envVarKey: ANTHROPIC_API_KEY
      - key: INTERNAL_MEDIA_TOKEN
        fromService:
          type: web
          name: scdms-api
          envVarKey: INTERNAL_MEDIA_TOKEN

  - type: worker
    name: scdms-celery-beat
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    dockerCommand: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: RENDER
        value: "true"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: scdms-api
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: scdms-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString

  - type: web
    name: scdms-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # Do not rewrite hashed bundles — catch-all only was serving index.html for *.css (MIME error).
    routes:
      - type: rewrite
        source: /assets/*
        destination: /assets/:splat
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
