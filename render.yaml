# Render Blueprint — Commission Decision App (SCDMS)
# Docs: docs/deployment-render.md
#
# Deploy: connect GitHub repo → New Blueprint → select this file.
# After first deploy, set sync:false env vars in the Render dashboard.

databases:
  - name: scdms-db
    databaseName: commission_decision
    user: scdms
    plan: basic-256mb

services:
  - type: keyvalue
    name: scdms-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: scdms-api
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    healthCheckPath: /health/
    disk:
      name: scdms-media
      mountPath: /var/scdms/media
      sizeGB: 10
    envVars:
      - key: RENDER
        value: "true"
      - key: DJANGO_DEBUG
        value: "false"
      - key: AUTO_SEED
        value: "0"
      - key: SERVE_MEDIA
        value: "true"
      - key: USE_WHITENOISE
        value: "true"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: scdms-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CDP_BASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_TLS
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  - type: worker
    name: scdms-celery-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    dockerCommand: celery -A config worker -l info
    envVars:
      - key: RENDER
        value: "true"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: scdms-api
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: scdms-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        fromService:
          type: web
          name: scdms-api
          envVarKey: ANTHROPIC_API_KEY

  - type: worker
    name: scdms-celery-beat
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    dockerCommand: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: RENDER
        value: "true"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: scdms-api
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: scdms-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: scdms-redis
          property: connectionString

  - type: web
    name: scdms-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
