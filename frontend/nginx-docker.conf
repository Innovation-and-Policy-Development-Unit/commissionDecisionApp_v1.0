# Preserve HTTPS when TLS terminates at Caddy (or another edge proxy).
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── NCSS 2030 Security Headers ────────────────────────────────────────────
    # HTTP Strict Transport Security (enable once TLS is live)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Deny framing from other origins (clickjacking protection)
    add_header X-Frame-Options "DENY" always;

    # Enable XSS filter in legacy browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control referrer information leakage
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser features not needed by SCDMS
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    # Content Security Policy — tightened for SPA + API-only external calls
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Do not cache error pages
    error_page 404 /index.html;

    # SPA: never cache the shell so new JS/CSS hashes are picked up after deploy
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        # Repeat security headers inside location blocks (nginx scoping)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    }

    # ES module workers (.mjs) — must come before the generic JS/CSS block
    # nginx's built-in mime.types doesn't include .mjs, so it defaults to
    # application/octet-stream which browsers reject for module scripts.
    location ~* \.mjs$ {
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Immutable static assets (hashed filenames)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # API proxy to Django backend
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        # Use $http_host (includes port) so Django builds correct absolute URLs
        proxy_set_header Host $http_host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # Allow document uploads up to 20 MB
        client_max_body_size 20m;

        # Hide backend version info
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Media files served directly from the shared volume (no Django overhead)
    # ^~ prevents the static-asset regex from intercepting /media/*.png etc.
    location ^~ /media/ {
        alias /var/scdms/media/;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "private, max-age=3600";
    }

    # SPA fallback — all routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
        return 404;
    }
}
