<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    SCDMS full-colour brand mark.
    Designed for use on the dark navy (#0c2451) login panel.
    Colours:
      Document  – white at 90 % opacity
      Seal ring – amber / gold  #f59e0b
      Checkmark – white
      Stack ghost page – white at 20 %
  -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ghost back page (submission stack) -->
  <rect x="28" y="14" width="60" height="76" rx="5"
        fill="white" opacity="0.18"/>

  <!-- Main document — white card -->
  <path d="M14,10 H66 L88,32 V110 H14 Z"
        fill="white" opacity="0.92"/>

  <!-- Dog-ear fold — slightly darker white -->
  <path d="M66,10 L66,32 L88,32"
        fill="#d1d5db" opacity="0.7"/>
  <!-- Fold crease hairline -->
  <path d="M66,32 L88,32" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>

  <!-- Text lines — slate coloured, representing submission content -->
  <rect x="23" y="44" width="50" height="7" rx="3.5" fill="#334155" opacity="0.45"/>
  <rect x="23" y="57" width="38" height="7" rx="3.5" fill="#334155" opacity="0.45"/>
  <rect x="23" y="70" width="44" height="7" rx="3.5" fill="#334155" opacity="0.45"/>
  <rect x="23" y="83" width="30" height="7" rx="3.5" fill="#334155" opacity="0.30"/>

  <!-- Decision seal — amber ring -->
  <circle cx="86" cy="92" r="26" fill="#0c2451"/>
  <circle cx="86" cy="92" r="24" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="86" cy="92" r="20" fill="#d97706"/>

  <!-- Inner ring detail -->
  <circle cx="86" cy="92" r="17"
          fill="none" stroke="#fde68a" stroke-width="1" opacity="0.5"/>

  <!-- Checkmark — bold white -->
  <polyline
    points="76,92 82,99 97,80"
    stroke="white"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>
</svg>
