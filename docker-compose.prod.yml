# Production overlay: TLS via Let's Encrypt (Certbot) + Nginx on `web`.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# See docs/deployment-tls.md for first-time certificate issuance.

services:
  web:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - scdms_media:/var/scdms/media:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - ./frontend/nginx-docker-ssl.conf:/etc/nginx/conf.d/default.conf:ro

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks:
      - app
    restart: unless-stopped

volumes:
  certbot_www:
  certbot_conf:
